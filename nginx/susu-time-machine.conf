# Nginx reverse proxy for "酥酥时光机".
# Copy this file to /etc/nginx/conf.d/susu-time-machine.conf or symlink it
# from /etc/nginx/sites-enabled/, then replace the server_name values.

upstream susu_time_machine_app {
  server 127.0.0.1:5174;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name susu-time-machine.cnhalo.com;

  client_max_body_size 20m;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Port $server_port;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location /_next/static/ {
    proxy_pass http://susu_time_machine_app;
    proxy_cache_valid 200 30d;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    proxy_pass http://susu_time_machine_app;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
