name: 🚀 Deploy Only

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'APP 镜像标签（默认 latest）'
        required: false
        default: 'latest'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  APP_IMAGE_NAME: 'ghcr.io/${{ github.repository_owner }}/susu-time-machine'
  LOCAL_IMAGE_NAME: 'susu-time-machine:local'
  REMOTE_APP_DIR: '/app/susu-time-machine'
  IMAGE_ARCHIVE: 'susu-time-machine-image.tar.gz'

jobs:
  deploy-only:
    name: 🚀 Deploy Existing Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 📦 Pull and save APP image on GitHub runner
        run: |
          IMAGE="${{ env.APP_IMAGE_NAME }}:${{ github.event.inputs.image_tag || 'latest' }}"
          docker pull "$IMAGE"
          docker tag "$IMAGE" "${{ env.APP_IMAGE_NAME }}:latest"
          docker tag "$IMAGE" "${{ env.LOCAL_IMAGE_NAME }}"
          docker save "$IMAGE" "${{ env.APP_IMAGE_NAME }}:latest" "${{ env.LOCAL_IMAGE_NAME }}" | gzip > "${{ env.IMAGE_ARCHIVE }}"
          ls -lh "${{ env.IMAGE_ARCHIVE }}"

      - name: 🗂️ Prepare remote directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p "${{ env.REMOTE_APP_DIR }}"

      - name: 📤 Upload deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml,${{ env.IMAGE_ARCHIVE }}
          target: ${{ env.REMOTE_APP_DIR }}
          overwrite: true

      - name: 🌐 Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            mkdir -p "${{ env.REMOTE_APP_DIR }}/data"
            mkdir -p "${{ env.REMOTE_APP_DIR }}/backup"

            cat > "${{ env.REMOTE_APP_DIR }}/.env" <<'EOF'
            ${{ secrets.APP_ENV_FILE }}
            EOF

            grep -q '^AUTH_SECRET=' "${{ env.REMOTE_APP_DIR }}/.env" || {
              echo "ERROR: APP_ENV_FILE must include AUTH_SECRET"
              exit 1
            }

            cd "${{ env.REMOTE_APP_DIR }}"

            if [ -f "${{ env.REMOTE_APP_DIR }}/data/app.db" ]; then
              cp "${{ env.REMOTE_APP_DIR }}/data/app.db" "${{ env.REMOTE_APP_DIR }}/backup/app-$(date +%Y%m%d-%H%M%S).db"
              find "${{ env.REMOTE_APP_DIR }}/backup" -name "app-*.db" -mtime +14 -delete || true
            fi

            export APP_IMAGE="${{ env.LOCAL_IMAGE_NAME }}"
            export DOCKER_DATABASE_URL="file:/app/data/app.db"
            docker load -i "${{ env.IMAGE_ARCHIVE }}"
            docker compose up -d --remove-orphans app
            rm -f "${{ env.IMAGE_ARCHIVE }}"
