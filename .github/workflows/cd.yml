name: 🐳🚀 Build and Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      build_and_push_image:
        description: '🛠️ Build and push image'
        required: false
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
      deploy:
        description: '🚀 Deploy (if false, only build)'
        required: false
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  APP_IMAGE_NAME: 'ghcr.io/${{ github.repository_owner }}/susu-time-machine'
  REMOTE_APP_DIR: '/app/susu-time-machine'

jobs:
  build-docker-image:
    name: 🐳 Build Docker Image
    if: ${{ github.event_name == 'push' || github.event.inputs.build_and_push_image == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: 🚢 Build and push APP image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE_NAME }}:latest
            ${{ env.APP_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-server:
    name: 🚀 Deploy to Server
    needs: build-docker-image
    if: ${{ (github.event_name == 'push' || github.event.inputs.deploy == 'true') && (needs.build-docker-image.result == 'success' || needs.build-docker-image.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v5

      - name: 📤 Upload docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: ${{ env.REMOTE_APP_DIR }}
          overwrite: true

      - name: 🌐 Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            mkdir -p "${{ env.REMOTE_APP_DIR }}/data"
            mkdir -p "${{ env.REMOTE_APP_DIR }}/backup"

            cat > "${{ env.REMOTE_APP_DIR }}/.env" <<'EOF'
            ${{ secrets.APP_ENV_FILE }}
            EOF

            grep -q '^AUTH_SECRET=' "${{ env.REMOTE_APP_DIR }}/.env" || {
              echo "ERROR: APP_ENV_FILE must include AUTH_SECRET"
              exit 1
            }

            echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

            cd "${{ env.REMOTE_APP_DIR }}"

            if [ -f "${{ env.REMOTE_APP_DIR }}/data/app.db" ]; then
              cp "${{ env.REMOTE_APP_DIR }}/data/app.db" "${{ env.REMOTE_APP_DIR }}/backup/app-$(date +%Y%m%d-%H%M%S).db"
              find "${{ env.REMOTE_APP_DIR }}/backup" -name "app-*.db" -mtime +14 -delete || true
            fi

            export APP_IMAGE="${{ env.APP_IMAGE_NAME }}:latest"
            export DOCKER_DATABASE_URL="file:/app/data/app.db"
            docker compose pull app
            docker compose up -d --remove-orphans app
